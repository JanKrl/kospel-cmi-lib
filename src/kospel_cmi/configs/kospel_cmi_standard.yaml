heater_mode:
  register: "0b55"
  decode: heater_mode
  encode: heater_mode

is_manual_mode_enabled:
  register: "0b55"
  bit_index: 9
  decode:
    type: map
    true_value: ManualMode.ENABLED
    false_value: ManualMode.DISABLED
  encode:
    type: map
    true_value: ManualMode.ENABLED
    false_value: ManualMode.DISABLED

is_water_heater_enabled:
  register: "0b55"
  bit_index: 4
  decode:
    type: map
    true_value: WaterHeaterEnabled.ENABLED
    false_value: WaterHeaterEnabled.DISABLED
  encode:
    type: map
    true_value: WaterHeaterEnabled.ENABLED
    false_value: WaterHeaterEnabled.DISABLED

is_pump_co_running:
  register: "0b51"
  bit_index: 0
  decode:
    type: map
    true_value: PumpStatus.RUNNING
    false_value: PumpStatus.IDLE

is_pump_circulation_running:
  register: "0b51"
  bit_index: 1
  decode:
    type: map
    true_value: PumpStatus.RUNNING
    false_value: PumpStatus.IDLE

valve_position:
  register: "0b51"
  bit_index: 2
  decode:
    type: map
    true_value: ValvePosition.CO
    false_value: ValvePosition.DHW

manual_temperature:
  register: "0b8d"
  decode: scaled_x10
  encode: scaled_x10

room_temperature_economy:
  register: "0b68"
  decode: scaled_x10
  encode: scaled_x10

room_temperature_comfort:
  register: "0b6a"
  decode: scaled_x10
  encode: scaled_x10

room_temperature_comfort_plus:
  register: "0b6b"
  decode: scaled_x10
  encode: scaled_x10

room_temperature_comfort_minus:
  register: "0b69"
  decode: scaled_x10
  encode: scaled_x10

cwu_temperature_economy:
  register: "0b66"
  decode: scaled_x10
  encode: scaled_x10

cwu_temperature_comfort:
  register: "0b67"
  decode: scaled_x10
  encode: scaled_x10

pressure:
  register: "0b8a"
  decode: scaled_pressure

room_temperature:
  register: "0b4b"
  decode: scaled_x10

# Tryb wakacje (vacation mode)
# Czas trwania: 0b59 (scaled ×10, wartość w GODZINACH, np. 79.5 = 79.5 h)
# scaled_x10: wartość ×10 w rejestrze (format jak temperatury)
# Czas zakończenia: 0b6c-0b70 (minuta, godzina, dzień, miesiąc, rok)
# 0b5a = 0xffff (-1) gdy "Do odwołania" (indefinite)
vacation_duration_hours:
  register: "0b59"
  decode: scaled_x10
  encode: scaled_x10

vacation_end_indefinite:
  register: "0b5a"
  decode: raw_int

vacation_end_minute:
  register: "0b6c"
  decode: raw_int
  encode: raw_int

vacation_end_hour:
  register: "0b6d"
  decode: raw_int
  encode: raw_int

vacation_end_day:
  register: "0b6e"
  decode: raw_int
  encode: raw_int

vacation_end_month:
  register: "0b6f"
  decode: raw_int
  encode: raw_int

vacation_end_year:
  register: "0b70"
  decode: raw_int
  encode: raw_int
